---
# Debian Family Installation
- name: "Install dependent packages for Debian Distribution family."
  ansible.builtin.apt:
    name: "{{ haproxy_debian_dependent_packages }}"
    update_cache: true
  when:
    - ansible_os_family == "Debian"

- name: "Download Repository GPG Key."
  ansible.builtin.get_url:
    url: "{{ haproxy_installer.key }}"
    dest: /usr/share/keyrings/haproxy-archive-keyring.gpg
    mode: '0644'
  when:
    - ansible_os_family == "Debian"
    - haproxy_installer.method == "repo"

- name: "Add HAProxy Apt Repository (Deb822 format)."
  ansible.builtin.deb822_repository:
    name: haproxy
    types: [deb]
    uris: ["{{ haproxy_installer.repo }}"]
    suites: ["{{ haproxy_installer.suite }}"]
    components: [main]
    signed_by: /usr/share/keyrings/haproxy-archive-keyring.gpg
    state: present
  when:
    - ansible_os_family == "Debian"
    - haproxy_installer.method == "repo"

- name: "Install PPA Repository (Deb822 format)."
  ansible.builtin.deb822_repository:
    name: "{{ haproxy_installer.ppa | replace('/', '-') }}"
    uris: "https://ppa.launchpadcontent.net/{{ haproxy_installer.ppa }}/ubuntu"
    suites: "{{ ansible_distribution_release | lower }}"
    components: "main"
    signed_by: "https://keyserver.ubuntu.com/pks/lookup?op=get&options=mr&search=0x{{ haproxy_installer.id }}"
  when:
    - ansible_os_family == "Debian"
    - haproxy_installer.method == "ppa"

- name: "Update APT again for Debian Distribution family."
  ansible.builtin.apt:
    update_cache: true
  when: ansible_os_family == "Debian"

- name: "Install Haproxy for Debian Distribution family in specific version."
  ansible.builtin.apt:
    name: "{{ haproxy_package_name }}={{ haproxy_version }}.*"
    state: "{{ haproxy_package_state }}"
    allow_downgrade: true
  when:
    - ansible_os_family == "Debian"
    - haproxy_installer.set_version | bool

- name: "Install Haproxy for Debian distribution family without specific Version."
  ansible.builtin.apt:
    name: "{{ haproxy_package_name }}"
    state: "{{ haproxy_package_state }}"
    allow_downgrade: true
  when:
    - ansible_os_family == "Debian"
    - not haproxy_installer.set_version | bool

# Tool Installations
- name: "Install SELinux packages."
  ansible.builtin.apt:
    name: "{{ selinux_package }}"
  loop: "{{ haproxy_selinux_packages }}"
  loop_control:
    loop_var: selinux_package
  when:
    - ansible_os_family == "Debian"
    - haproxy_selinux_enabled | bool

# RedHat Family Installation
- name: "Get dnf Repositories."
  ansible.builtin.command: dnf repolist
  register: haproxy_dnf_repos
  when:
    - ansible_os_family == "RedHat"
    - haproxy_show_debug | bool

- name: "Show dnf Repositories."
  ansible.builtin.debug:
    msg: "{{ haproxy_dnf_repos.stdout_lines }}"
  when:
    - ansible_os_family == "RedHat"
    - haproxy_show_debug | bool

- name: "Install Haproxy for RedHat Distribution Family."
  ansible.builtin.dnf:
    name: "{{ haproxy_package_name }}"
    state: "{{ haproxy_package_state }}"
    allow_downgrade: true
  when:
    - ansible_os_family == "RedHat"
    - not haproxy_installer.set_version

# Early Directory Setup
- name: "Create Config Directories."
  ansible.builtin.file:
    state: directory
    mode: "{{ haproxy_config_dirs_elmt.mode | default('0755') }}"
    owner: "{{ haproxy_user }}"
    group: "{{ haproxy_group }}"
    path: "{{ haproxy_config_dirs_elmt }}"
  loop: "{{ haproxy_config_dirs }}"
  loop_control:
    loop_var: haproxy_config_dirs_elmt

# Debug Version Informations
- name: "Gather the package facts."
  ansible.builtin.package_facts:
    manager: auto
  when: haproxy_show_debug | bool

- name: "Print haproxy package facts."
  ansible.builtin.debug:
    msg: "{{ ansible_facts.packages['haproxy'][0].version }}"
  when: haproxy_show_debug | bool
...
